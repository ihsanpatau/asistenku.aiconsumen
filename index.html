<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="theme-color" content="#2563eb"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/style.css"/>
<title>asistenku.pro — Asisten AI Pintar</title>
</head>
<body>
<div class="container">
  <div class="splash">
    <div class="splash-header">
      <h1 class="logo">asistenku<span class="dot-pro">.pro</span></h1>
      <p>Asisten AI pintar untuk membantu tugas akademik dan profesionalmu.</p>
    </div>
    <div class="splash-cat">
      <img src="assets/mascot.png?v=2" alt="Maskot asistenku.pro"/>
    </div>
    <div class="feature-strip" style="width:calc(100% - 8px);margin:0 4px">
      <div class="feature-item">
        <div class="fi-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></div>
        <h4>Cerdas</h4><p>AI terdepan untuk hasil terbaik</p>
      </div>
      <div class="feature-item">
        <div class="fi-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
        <h4>Aman</h4><p>Data dan privasi terjamin</p>
      </div>
      <div class="feature-item">
        <div class="fi-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
        <h4>Cepat</h4><p>Kerjakan apa saja dalam hitungan detik</p>
      </div>
      <div class="feature-item">
        <div class="fi-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
        <h4>Serba Bisa</h4><p>Untuk akademik, kerja, dan konsultasi</p>
      </div>
    </div>
    <div class="splash-bottom">
      <p class="splash-progress">Menyiapkan pengalaman terbaik untukmu...</p>
      <div class="splash-bar"><span></span></div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/app.js"></script>
<script>
  // Auto redirect after splash based on session
  setTimeout(async () => {
    try {
      const { data: { session } } = await window.sb.auth.getSession();
      window.location.href = session ? 'home.html' : 'login.html';
    } catch(e) { window.location.href = 'login.html'; }
  }, 2200);
</script>
</body>
</html>
