<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="theme-color" content="#2563eb"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/style.css"/>
<title>Daftar — asistenku.pro</title>
</head>
<body>
<div class="container">
  <div class="auth-wrap">
    <a href="login.html" style="position:absolute;left:16px;top:16px;color:#334155">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </a>
    <h1 class="logo" style="font-size:26px">asistenku<span class="dot-pro" style="font-size:16px">.pro</span></h1>
    <p class="muted" style="font-size:13px;margin:6px 0 4px">Asisten AI pintar untuk membantu<br/>tugas akademik dan profesionalmu.</p>
    <div class="auth-cat" style="width:150px">
      <img src="assets/mascot.png?v=2" alt="Maskot"/>
    </div>
    <h2 class="auth-title">Buat akun baru</h2>
    <p class="auth-sub">Daftar untuk mulai menggunakan asistenku.pro</p>

    <button class="social-btn" onclick="loginGoogle()">
      <svg viewBox="0 0 48 48" width="20" height="20"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.6 2.2 30.2 0 24 0 14.6 0 6.5 5.4 2.6 13.3l7.9 6.1C12.4 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.2-.4-4.7H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17.3z"/><path fill="#FBBC05" d="M10.5 28.6c-.6-1.8-.9-3.7-.9-5.6s.3-3.8.9-5.6l-7.9-6.1C1 15.1 0 19.4 0 24s1 8.9 2.6 12.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.6-2 15.5-5.5l-7.5-5.8c-2.1 1.4-4.8 2.3-8 2.3-6.3 0-11.6-3.7-13.5-9l-7.9 6.1C6.5 42.6 14.6 48 24 48z"/></svg>
      Daftar dengan Google
    </button>
    <button class="social-btn" onclick="loginApple()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 12.5c0-2.7 2.2-4 2.3-4.1-1.3-1.9-3.2-2.1-3.9-2.2-1.7-.2-3.3 1-4.1 1-.9 0-2.2-1-3.6-1-1.9 0-3.6 1.1-4.5 2.7-1.9 3.4-.5 8.4 1.4 11.2 1 1.3 2 2.9 3.5 2.8 1.4-.1 1.9-.9 3.6-.9 1.7 0 2.2.9 3.6.9 1.5 0 2.5-1.4 3.4-2.7 1.1-1.5 1.5-3 1.5-3.1-.1 0-2.9-1.1-2.9-4.6zM14.9 4.6c.8-1 1.3-2.3 1.1-3.6-1.1.1-2.5.8-3.3 1.7-.7.9-1.4 2.2-1.2 3.5 1.3.1 2.6-.6 3.4-1.6z"/></svg>
      Daftar dengan Apple
    </button>

    <div class="divider">atau</div>

    <form onsubmit="handleRegister(event)" style="text-align:left">
      <div class="input-group">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input class="input" type="text" name="name" placeholder="Nama lengkap" autocomplete="name" required/>
      </div>
      <div class="input-group">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input class="input" type="email" name="email" placeholder="Email" autocomplete="email" required/>
      </div>
      <div class="input-group">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <input class="input" type="tel" name="phone" placeholder="Nomor HP (opsional)" autocomplete="tel"/>
      </div>
      <div class="input-group">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input class="input" type="password" name="password" placeholder="Kata sandi" autocomplete="new-password" required/>
        <button type="button" class="toggle-eye" onclick="togglePw(this)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
      <div class="input-group">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input class="input" type="password" name="confirmPassword" placeholder="Konfirmasi kata sandi" autocomplete="new-password" required/>
        <button type="button" class="toggle-eye" onclick="togglePw(this)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
      <label class="checkbox" style="margin:6px 0 12px;align-items:flex-start;font-size:13px">
        <input type="checkbox" name="agree" checked/><span class="box" style="margin-top:2px"></span>
        <span>Saya setuju dengan <a href="#" class="link">Syarat &amp; Ketentuan</a> dan <a href="#" class="link">Kebijakan Privasi</a></span>
      </label>
      <div id="authError" class="error-msg"></div>
      <div id="authSuccess" class="success-msg"></div>
      <button class="btn btn-primary" type="submit">Daftar</button>
      <p class="text-center mt-4 muted" style="font-size:13px">Sudah punya akun? <a href="login.html" class="link">Masuk di sini</a></p>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/app.js"></script>
<script>redirectIfAuthed();</script>
</body>
</html>
