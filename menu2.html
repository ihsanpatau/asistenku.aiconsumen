<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="theme-color" content="#2563eb"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/style.css"/>
<title>Tugas &amp; Project — asistenku.pro</title>
</head>
<body>
<div class="container">
  <div class="chat-topbar">
    <a href="home.html" style="color:#334155"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></a>
    <h2 style="color:#059669">Tugas &amp; Project</h2>
  </div>

  <div class="chat-body" id="chatBody">
    <div class="chat-msg">
      <div class="av"><img src="assets/mascot.png?v=2"/></div>
      <div class="chat-bubble">Halo! Aku siap bantu kerjakan tugas atau project apapun. Kirim perintah, upload file (PDF/Word/Excel/PPT/gambar), atau tempel link sebagai referensi.<br/><br/><b>Contoh perintah:</b><br/>• “Kerjakan tugas ini”<br/>• “Buat laporan dari file ini”<br/>• “Analisis data pada file ini”</div>
    </div>
  </div>

  <form class="chat-input" id="chatForm">
    <button type="button" class="ic-btn" title="Lampirkan file"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
    <button type="button" class="ic-btn" title="Tempel link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></button>
    <textarea name="message" placeholder="Kirim perintah atau pertanyaan..." oninput="this.style.height='44px';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
    <button class="send-btn" type="submit" style="background:#059669" title="Kirim"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/app.js"></script>
<script>
requireAuth();
attachChat('#chatBody', '#chatForm');
</script>
</body>
</html>
