<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jurnal – asistenku.pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <div class="backnav">
    <div class="backnav-left">
      <button class="back-btn" onclick="history.back()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
      <div><div class="backnav-title">Jurnal</div><div class="backnav-sub">Buat jurnal baru atau konversi dari skripsi</div></div>
    </div>
    <a href="bantuan.html" style="background:var(--gray-100);border:none;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--dark);cursor:pointer;display:flex;align-items:center;gap:5px;text-decoration:none;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>Bantuan</a>
  </div>
  <div class="page-content">
    <div style="margin:16px 16px 0;background:linear-gradient(135deg,#ECFDF5,#A7F3D0);border-radius:20px;padding:16px 16px 0;overflow:hidden;position:relative;min-height:110px;">
      <h2 style="font-size:18px;font-weight:800;color:var(--green);max-width:180px;line-height:1.2;">Buat Jurnal Akademik dengan AI</h2>
      <p style="font-size:12px;color:var(--gray-500);margin-top:4px;max-width:180px;">Buat baru atau konversi dari skripsi/naskah yang sudah ada.</p>
      <div style="position:absolute;right:10px;bottom:0;width:90px;opacity:0.8;">
        <svg viewBox="0 0 120 130" fill="none"><ellipse cx="60" cy="110" rx="40" ry="22" fill="#16A34A" opacity="0.4"/><rect x="22" y="40" width="76" height="60" rx="6" fill="#16A34A" opacity="0.9"/><rect x="26" y="44" width="68" height="52" rx="4" fill="#ECFDF5"/><line x1="34" y1="54" x2="88" y2="54" stroke="#16A34A" stroke-width="2"/><line x1="34" y1="62" x2="88" y2="62" stroke="#A7F3D0" stroke-width="1.5"/><line x1="34" y1="70" x2="76" y2="70" stroke="#A7F3D0" stroke-width="1.5"/><line x1="34" y1="78" x2="88" y2="78" stroke="#A7F3D0" stroke-width="1.5"/><line x1="34" y1="86" x2="64" y2="86" stroke="#A7F3D0" stroke-width="1.5"/></svg>
      </div>
    </div>
    <div style="padding:16px;">
      <div class="toggle-tab">
        <button class="tab-btn active" onclick="switchMode(this,'baru')">Buat Jurnal Baru</button>
        <button class="tab-btn" onclick="switchMode(this,'konversi')">Konversi dari Skripsi</button>
      </div>
      <div id="mode-baru">
        <div class="form-group"><label class="form-label">Judul Jurnal <span style="color:var(--red)">*</span></label><input type="text" class="form-input" placeholder="Masukkan judul jurnal..."></div>
        <div class="form-group"><label class="form-label">Bidang Ilmu</label>
          <div class="type-pills">
            <button class="type-pill active" onclick="selectPill(this)">Manajemen</button>
            <button class="type-pill" onclick="selectPill(this)">Hukum</button>
            <button class="type-pill" onclick="selectPill(this)">Pendidikan</button>
            <button class="type-pill" onclick="selectPill(this)">Kesehatan</button>
            <button class="type-pill" onclick="selectPill(this)">Teknik</button>
            <button class="type-pill" onclick="selectPill(this)">Lainnya</button>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Gaya Jurnal</label>
          <div class="type-pills">
            <button class="type-pill active" onclick="selectPill(this)">SINTA</button>
            <button class="type-pill" onclick="selectPill(this)">Scopus</button>
            <button class="type-pill" onclick="selectPill(this)">IEEE</button>
            <button class="type-pill" onclick="selectPill(this)">APA</button>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Abstrak / Ringkasan Penelitian (Opsional)</label><textarea class="form-textarea" placeholder="Jelaskan penelitian Anda secara singkat..." rows="3"></textarea></div>
      </div>
      <div id="mode-konversi" style="display:none;">
        <div class="form-group"><label class="form-label">Upload File Skripsi/Naskah</label>
          <div class="upload-area" onclick="document.getElementById('jurnalFile').click()">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
            <div class="upload-label">Upload PDF, Word, atau TXT</div>
            <div class="upload-sub">Maks. 10MB</div>
            <input type="file" id="jurnalFile" accept=".pdf,.doc,.docx,.txt" style="display:none" onchange="showToast('File: '+this.files[0]?.name)">
          </div>
        </div>
        <div class="form-group"><label class="form-label">Jurnal Target (Opsional)</label><input type="text" class="form-input" placeholder="Contoh: Jurnal Manajemen Indonesia"></div>
      </div>
      <button class="btn btn-green" onclick="generate()" style="margin-top:4px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Generate Jurnal dengan AI
      </button>
    </div>
  </div>
  <nav class="bottom-nav">
    <a href="beranda.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span class="nav-label">Beranda</span></a>
    <a href="mahasiswa.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6L23 9zm0 2.18L18.82 9 12 12.72 5.18 9z"/></svg><span class="nav-label">Mahasiswa</span></a>
    <a href="tugas.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/></svg><span class="nav-label">Tugas</span></a>
    <a href="doktrai.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="nav-label">DoktrAI</span></a>
    <a href="profil.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="nav-label">Profil</span></a>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script>
function showToast(msg,d=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function selectPill(btn){btn.closest('.type-pills').querySelectorAll('.type-pill').forEach(p=>p.classList.remove('active'));btn.classList.add('active');}
function switchMode(btn,mode){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('mode-baru').style.display=mode==='baru'?'block':'none';document.getElementById('mode-konversi').style.display=mode==='konversi'?'block':'none';}
function generate(){
  const judul=document.querySelector('#mode-baru .form-input')?.value.trim();
  const bidang=document.querySelector('#mode-baru .type-pills:nth-of-type(1) .type-pill.active')?.textContent||document.querySelectorAll('#mode-baru .type-pills .type-pill.active')[0]?.textContent||'Umum';
  const gaya=document.querySelectorAll('#mode-baru .type-pills .type-pill.active')[1]?.textContent||'SINTA';
  const abstrakInput=document.querySelector('#mode-baru .form-textarea')?.value.trim();
  const isKonversi=document.getElementById('mode-konversi').style.display!=='none';

  let prompt;
  if(isKonversi){
    const jurnalTarget=document.querySelector('#mode-konversi .form-input')?.value.trim();
    prompt=`Buatkan sebuah jurnal akademik lengkap gaya ${jurnalTarget?('untuk '+jurnalTarget):'SINTA'} hasil konversi dari naskah skripsi (asumsikan naskah berisi penelitian ilmiah standar mahasiswa Indonesia). Sertakan: Judul, Abstrak (ID & EN), Pendahuluan, Metode, Hasil dan Pembahasan, Kesimpulan, dan Daftar Pustaka. Tulis dalam Bahasa Indonesia akademik.`;
  } else {
    if(!judul){showToast('Isi judul jurnal terlebih dahulu');return;}
    prompt=`Buatkan jurnal akademik lengkap dengan format ${gaya} untuk bidang ilmu ${bidang}. Judul: "${judul}". ${abstrakInput?('Ringkasan penelitian: '+abstrakInput):''}\nSertakan: Judul, Abstrak (Bahasa Indonesia & Inggris), Kata Kunci, Pendahuluan, Metode Penelitian, Hasil dan Pembahasan, Kesimpulan, dan Daftar Pustaka. Tulis dalam Bahasa Indonesia yang formal dan akademis.`;
  }

  localStorage.removeItem('task_result');
  localStorage.removeItem('task_result_structured');
  localStorage.removeItem('task_type');
  localStorage.setItem('task_prompt', judul || (isKonversi ? 'Jurnal dari Skripsi' : 'Jurnal Akademik'));
  localStorage.setItem('task_full_prompt', prompt);
  showToast('Memproses jurnal dengan AI...');
  setTimeout(()=>window.location.href='hasil-tugas.html',600);
}
if(!localStorage.getItem('ak_token')){window.location.href='login.html';}
</script>
</body>
</html>
