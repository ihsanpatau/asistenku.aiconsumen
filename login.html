<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="theme-color" content="#2563eb"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/style.css"/>
<title>Masuk — asistenku.pro</title>
</head>
<body>
<div class="container">
  <div class="auth-wrap">
    <h1 class="logo" style="font-size:28px">asistenku<span class="dot-pro" style="font-size:17px">.pro</span></h1>
    <p class="muted" style="font-size:14px;margin:6px 0 6px">Asisten AI pintar untuk membantu<br/>tugas akademik dan profesionalmu.</p>
    <div class="auth-cat">
      <img src="assets/mascot.png?v=2" alt="Maskot"/>
    </div>
    <h2 class="auth-title">Selamat datang kembali!</h2>
    <p class="auth-sub">Masuk untuk melanjutkan</p>

    <button class="social-btn" onclick="loginGoogle()">
      <svg viewBox="0 0 48 48" width="20" height="20"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.6 2.2 30.2 0 24 0 14.6 0 6.5 5.4 2.6 13.3l7.9 6.1C12.4 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.2-.4-4.7H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17.3z"/><path fill="#FBBC05" d="M10.5 28.6c-.6-1.8-.9-3.7-.9-5.6s.3-3.8.9-5.6l-7.9-6.1C1 15.1 0 19.4 0 24s1 8.9 2.6 12.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.6-2 15.5-5.5l-7.5-5.8c-2.1 1.4-4.8 2.3-8 2.3-6.3 0-11.6-3.7-13.5-9l-7.9 6.1C6.5 42.6 14.6 48 24 48z"/></svg>
      Masuk dengan Google
    </button>
    <button class="social-btn" onclick="loginApple()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 12.5c0-2.7 2.2-4 2.3-4.1-1.3-1.9-3.2-2.1-3.9-2.2-1.7-.2-3.3 1-4.1 1-.9 0-2.2-1-3.6-1-1.9 0-3.6 1.1-4.5 2.7-1.9 3.4-.5 8.4 1.4 11.2 1 1.3 2 2.9 3.5 2.8 1.4-.1 1.9-.9 3.6-.9 1.7 0 2.2.9 3.6.9 1.5 0 2.5-1.4 3.4-2.7 1.1-1.5 1.5-3 1.5-3.1-.1 0-2.9-1.1-2.9-4.6zM14.9 4.6c.8-1 1.3-2.3 1.1-3.6-1.1.1-2.5.8-3.3 1.7-.7.9-1.4 2.2-1.2 3.5 1.3.1 2.6-.6 3.4-1.6z"/></svg>
      Masuk dengan Apple
    </button>

    <div class="divider">atau</div>

    <form onsubmit="handleLogin(event)" style="text-align:left">
      <div class="input-group">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input class="input" type="text" name="email" placeholder="Email atau nomor HP" autocomplete="username" required/>
      </div>
      <div class="input-group">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input class="input" type="password" name="password" placeholder="Kata sandi" autocomplete="current-password" required/>
        <button type="button" class="toggle-eye" onclick="togglePw(this)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="auth-links">
        <label class="checkbox">
          <input type="checkbox" name="remember" checked/><span class="box"></span>Ingat saya
        </label>
        <a href="#" class="link">Lupa kata sandi?</a>
      </div>
      <div id="authError" class="error-msg"></div>
      <button class="btn btn-primary" type="submit">Masuk</button>
      <p class="text-center mt-4 muted" style="font-size:13px">Belum punya akun? <a href="register.html" class="link">Daftar di sini</a></p>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/app.js"></script>
<script>redirectIfAuthed();</script>
</body>
</html>
