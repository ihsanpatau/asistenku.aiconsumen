<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dokumen Saya – asistenku.pro</title>
<link rel="stylesheet" href="style.css">
<script src="theme.js"></script>
<script src="i18n.js"></script>
<script src="riwayat-store.js"></script>
<script src="account.js"></script>
<style>
.doc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px; }
.doc-card {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--r-lg);
  padding: 14px;
  cursor: pointer;
  transition: box-shadow .2s, transform .2s;
}
.doc-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.doc-card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
.doc-card-icon {
  width: 42px; height: 42px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.doc-card-icon svg { width: 20px; height: 20px; color: #fff; }
.doc-card-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 99px; }
.doc-card-title { font-size: 12.5px; font-weight: 700; color: var(--gray-900); line-height: 1.35; margin-bottom: 8px; min-height: 34px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.doc-card-meta { display:flex; align-items:center; gap:5px; font-size: 10.5px; color: var(--gray-400); font-weight:600; }
.doc-card-meta svg { width:12px; height:12px; flex-shrink:0; }

.dok-stats { display:flex; gap:10px; padding:0 16px; margin-bottom:16px; }
.dok-stat { flex:1; border-radius:14px; padding:12px 10px; text-align:center; }
.dok-stat-num { font-size:20px; font-weight:800; line-height:1.1; }
.dok-stat-lbl { font-size:10.5px; color:var(--gray-500); margin-top:3px; font-weight:600; }

.empty-wrap { text-align:center; padding:56px 24px 40px; grid-column:1/-1; }
.empty-badge {
  width:76px; height:76px; border-radius:50%; margin:0 auto 16px;
  background:linear-gradient(135deg,var(--brand-50),#E6ECFF);
  display:flex; align-items:center; justify-content:center; color:var(--brand-light);
}
.empty-title { font-size:14.5px; font-weight:700; color:var(--gray-700); }
.empty-sub { font-size:12.5px; color:var(--gray-400); margin-top:4px; max-width:260px; margin-left:auto; margin-right:auto; line-height:1.5; }
</style>
</head>
<body>
<div class="app">
  <div class="backnav">
    <div class="backnav-left">
      <button class="back-btn" onclick="history.back()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
      <div><div class="backnav-title" data-i18n="backnav.dokumen.title">Dokumen Saya</div><div class="backnav-sub" data-i18n="backnav.dokumen.sub">Semua dokumen yang pernah dibuat</div></div>
    </div>
    <button onclick="showToast('Urutkan')" style="background:var(--gray-100);border:none;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--dark);cursor:pointer;display:flex;align-items:center;gap:4px;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>Urutkan
    </button>
  </div>
  <div class="page-content">
    <div class="search-bar" style="margin-top:12px;">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="cariDokumen" placeholder="Cari dokumen...">
    </div>
    <div class="toggle-tab" style="margin:0 16px 14px;">
      <button class="tab-btn active" onclick="filterTab(this,'semua')">Semua</button>
      <button class="tab-btn" onclick="filterTab(this,'skripsi')">Skripsi</button>
      <button class="tab-btn" onclick="filterTab(this,'tugas')">Tugas</button>
      <button class="tab-btn" onclick="filterTab(this,'jurnal')">Jurnal</button>
    </div>

    <!-- Stats -->
    <div class="dok-stats">
      <div class="dok-stat" style="background:#EEF2FF;">
        <div class="dok-stat-num" style="color:var(--brand-light);" id="statTotal">0</div>
        <div class="dok-stat-lbl">Total Dokumen</div>
      </div>
      <div class="dok-stat" style="background:#ECFDF5;">
        <div class="dok-stat-num" style="color:var(--green);" id="statHalaman">0</div>
        <div class="dok-stat-lbl">Total Halaman</div>
      </div>
      <div class="dok-stat" style="background:#F5F3FF;">
        <div class="dok-stat-num" style="color:var(--purple);" id="statBulan">0</div>
        <div class="dok-stat-lbl">Bulan Ini</div>
      </div>
    </div>

    <div class="doc-grid" id="docGrid"></div>
    <div style="height:20px;"></div>
  </div>
    <nav class="bottom-nav">
    <a href="beranda.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span class="nav-label" data-i18n="nav.beranda">Beranda</span></a>
    <a href="riwayat.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span class="nav-label" data-i18n="nav.riwayat">Riwayat</span></a>
    <a href="dokumen.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span class="nav-label" data-i18n="nav.dokumen">Dokumen</span></a>
    <a href="upgrade.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg><span class="nav-label" data-i18n="nav.kuota">Kuota Saya</span></a>
    <a href="profil.html" class="nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2"/></svg><span class="nav-label" data-i18n="nav.profil">Profil</span></a>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script>
function showToast(msg,d=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
if(!localStorage.getItem('ak_token')){window.location.href='login.html';}

const docIconSvg = '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/>';
const docIconMap = {
  tugas:   { bg:'linear-gradient(135deg,#2B579A,#1E3E75)', badgeBg:'#FEF3C7', badgeColor:'#92400E', badgeLabel:'Tugas' },
  makalah: { bg:'linear-gradient(135deg,#7C3AED,#5B21B6)', badgeBg:'#EDE9FE', badgeColor:'#5B21B6', badgeLabel:'Makalah' },
  jurnal:  { bg:'linear-gradient(135deg,#16A34A,#0F7A37)', badgeBg:'#DCFCE7', badgeColor:'#166534', badgeLabel:'Jurnal' },
  skripsi: { bg:'linear-gradient(135deg,#2B579A,#1E3E75)', badgeBg:'#DCFCE7', badgeColor:'#166534', badgeLabel:'Skripsi' }
};
let currentTab='semua';

function formatTanggal(iso){
  try{ return new Date(iso).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }
  catch(e){ return ''; }
}

function getDokumenItems(){
  let items=[];
  try{ items = typeof RiwayatStore!=='undefined' ? RiwayatStore.semua() : []; }catch(e){}
  return items.filter(x=>x.kategori!=='chat');
}

function renderStats(){
  const all=getDokumenItems();
  const now=new Date();
  const totalHalaman=all.reduce((sum,x)=>sum+(x.halaman||(x.kataTerhitung?Math.max(1,Math.round(x.kataTerhitung/275)):0)),0);
  const bulanIni=all.filter(x=>{ const d=new Date(x.waktu); return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear(); }).length;
  document.getElementById('statTotal').textContent=all.length;
  document.getElementById('statHalaman').textContent=totalHalaman;
  document.getElementById('statBulan').textContent=bulanIni;
}

function renderDokumen(){
  let items=getDokumenItems();
  if(currentTab!=='semua') items=items.filter(x=>x.kategori===currentTab);
  const q=(document.getElementById('cariDokumen').value||'').toLowerCase().trim();
  if(q) items=items.filter(x=>(x.judul||'').toLowerCase().includes(q));
  items.sort((a,b)=>new Date(b.waktu)-new Date(a.waktu));

  const grid=document.getElementById('docGrid');
  if(!items.length){
    grid.innerHTML=`<div class="empty-wrap">
      <div class="empty-badge">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div class="empty-title">Belum ada dokumen${currentTab!=='semua'?' untuk kategori ini':''}</div>
      <div class="empty-sub">Dokumen yang kamu buat lewat Skripsi, Tugas, Makalah &amp; Jurnal akan muncul di sini.</div>
    </div>`;
    return;
  }

  grid.innerHTML=items.map(it=>{
    const meta=docIconMap[it.kategori]||docIconMap.tugas;
    const halaman=it.halaman||(it.kataTerhitung?Math.max(1,Math.round(it.kataTerhitung/275)):0);
    return `
      <div class="doc-card" onclick="${it.link?`window.location.href='${it.link}'`:''}">
        <div class="doc-card-top">
          <div class="doc-card-icon" style="background:${meta.bg};"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${docIconSvg}</svg></div>
          <div class="doc-card-badge" style="background:${meta.badgeBg};color:${meta.badgeColor};">${it.kategoriLabel||meta.badgeLabel}</div>
        </div>
        <div class="doc-card-title">${(it.judul||'Tanpa judul').replace(/</g,'&lt;')}</div>
        <div class="doc-card-meta">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${formatTanggal(it.waktu)}${halaman? ' • '+halaman+' hal':''}
        </div>
      </div>`;
  }).join('');
}

function filterTab(btn,tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentTab=tab;
  renderDokumen();
}
document.getElementById('cariDokumen').addEventListener('input', renderDokumen);

renderStats();
renderDokumen();
</script>
</body>
</html>
