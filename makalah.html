<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

<body>

  <div class="backnav">
    <div class="backnav-left">
      <button class="back-btn" onclick="history.back()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
      <div><div class="backnav-title">Makalah</div><div class="backnav-sub">Buat makalah akademik dari judul atau file</div></div>
    </div>
  </div>
  <div class="page-content">
    <div style="margin:16px 16px 0;background:linear-gradient(135deg,#F5F3FF,#DDD6FE);border-radius:20px;padding:16px;overflow:hidden;position:relative;">
      <h2 style="font-size:18px;font-weight:800;color:var(--purple);max-width:180px;line-height:1.2;">Makalah Berkualitas dalam Menit</h2>
      <p style="font-size:12px;color:var(--gray-500);margin-top:4px;max-width:200px;">Buat makalah lengkap dari judul atau file referensi yang Anda miliki.</p>
    </div>
    <div style="padding:16px;">
      <div class="form-group"><label class="form-label">Judul Makalah <span style="color:var(--red)">*</span></label><input type="text" class="form-input" id="judulMakalah" placeholder="Masukkan judul makalah..."></div>
      <div class="form-group"><label class="form-label">Mata Kuliah / Bidang Studi</label><input type="text" class="form-input" id="bidangMakalah" placeholder="Contoh: Manajemen Pemasaran"></div>
      <div class="form-group"><label class="form-label">Jenis Makalah</label>
        <div class="type-pills" id="jenisMakalahPills">
          <button class="type-pill active" onclick="selectPill(this)">Deskriptif</button>
          <button class="type-pill" onclick="selectPill(this)">Argumentatif</button>
          <button class="type-pill" onclick="selectPill(this)">Analitis</button>
          <button class="type-pill" onclick="selectPill(this)">Komparatif</button>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Target Halaman</label>
        <div class="type-pills" id="halamanMakalahPills">
          <button class="type-pill active" onclick="selectPill(this)">10 hal</button>
          <button class="type-pill" onclick="selectPill(this)">15 hal</button>
          <button class="type-pill" onclick="selectPill(this)">20 hal</button>
          <button class="type-pill" onclick="selectPill(this)">25+ hal</button>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Upload Referensi (Opsional)</label>
        <div class="upload-area" id="uploadAreaMakalah" onclick="document.getElementById('makalahFile').click()">
          <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
          <div class="upload-label" id="uploadLabelMakalah">Upload PDF atau Word</div>
          <div class="upload-sub" id="uploadSubMakalah">Opsional – untuk referensi tambahan</div>
          <input type="file" id="makalahFile" accept=".pdf,.docx,.txt" style="display:none" onchange="onPickMakalahFile(this)">
        </div>
      </div>
      <div class="form-group"><label class="form-label">Catatan Tambahan (Opsional)</label><textarea class="form-textarea" id="catatanMakalah" placeholder="Instruksi khusus atau poin yang harus dimasukkan..." rows="2"></textarea></div>
      <div class="form-group"><label class="form-label">Nama Penulis (untuk sampul)</label><input type="text" class="form-input" id="namaPenulisMakalah" placeholder="Nama lengkap Anda"></div>
      <button class="btn btn-primary" id="btnGenerateMakalah" onclick="generate()" style="background:var(--purple);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Generate Makalah
      </button>
    </div>
  </div>

    <a href="upgrade.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg><span class="nav-label">Kuota Saya</span></a>
    <a href="profil.html" class="nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2"/></svg><span class="nav-label">Profil</span></a>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script>
function showToast(msg,d=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function selectPill(btn){btn.closest('.type-pills').querySelectorAll('.type-pill').forEach(p=>p.classList.remove('active'));btn.classList.add('active');}
if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}

// ===== Upload referensi (PDF/DOCX/TXT) — dibaca langsung di browser, isinya dikirim ke AI =====
let makalahFileState = null;
function onPickMakalahFile(input){
  const file = input.files && input.files[0];
  if(!file) return; // batal pilih, jangan tampilkan apa-apa (dulu ini penyebab "File: undefined")
  if(file.size > 10*1024*1024){ showToast('Ukuran file maksimal 10MB'); input.value=''; return; }
  const ext = file.name.split('.').pop().toLowerCase();
  if(!['pdf','docx','txt'].includes(ext)){ showToast('Format harus PDF, DOCX, atau TXT'); input.value=''; return; }
  makalahFileState = file;
  const area=document.getElementById('uploadAreaMakalah');
  area.classList.add('filled');
  document.getElementById('uploadLabelMakalah').textContent = file.name;
  document.getElementById('uploadSubMakalah').textContent = (file.size/1024/1024).toFixed(2)+' MB • siap dibaca AI (klik lagi untuk ganti)';
  showToast('File referensi dipilih: '+file.name);
}

async function extractFileTextMakalah(file){
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='txt') return await file.text();
  if(ext==='docx'){
    if(!window.mammoth) throw new Error('Modul pembaca DOCX gagal dimuat, cek koneksi internet.');
    const arrayBuffer=await file.arrayBuffer();
    const result=await window.mammoth.extractRawText({arrayBuffer});
    return result.value || '';
  }
  if(ext==='pdf'){
    if(!window.pdfjsLib) throw new Error('Modul pembaca PDF gagal dimuat, cek koneksi internet.');
    const arrayBuffer=await file.arrayBuffer();
    const pdf=await window.pdfjsLib.getDocument({data:arrayBuffer}).promise;
    let text='';
    const maxPages=Math.min(pdf.numPages,60);
    for(let i=1;i<=maxPages;i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      text += content.items.map(it=>it.str).join(' ') + '\n';
    }
    return text;
  }
  throw new Error('Format file tidak didukung.');
}

async function generate(){
  const judul=document.getElementById('judulMakalah').value.trim();
  if(!judul){showToast('Isi judul makalah terlebih dahulu');return;}
  const bidang=document.getElementById('bidangMakalah').value.trim()||'Umum';
  const jenis=document.querySelector('#jenisMakalahPills .type-pill.active')?.textContent||'Deskriptif';
  const halaman=document.querySelector('#halamanMakalahPills .type-pill.active')?.textContent||'10 hal';
  const catatan=document.getElementById('catatanMakalah').value.trim();
  const penulis=document.getElementById('namaPenulisMakalah').value.trim()||'Nama Mahasiswa';

  const jumlahSubBab = halaman.includes('20') || halaman.includes('25') ? 4 : (halaman.includes('15') ? 3 : 2);

  let referensiText = '';
  if(makalahFileState){
    try{
      showToast('Membaca file referensi...');
      referensiText = (await extractFileTextMakalah(makalahFileState)).trim();
    }catch(e){
      showToast('Gagal membaca file referensi: '+e.message);
      return;
    }
  }
  const referensiBlok = referensiText
    ? `\n\n=== ISI FILE REFERENSI YANG DIUPLOAD PENULIS (WAJIB dijadikan acuan/sumber utama, kutip & sesuaikan isinya, jangan abaikan) ===\n${referensiText.substring(0,12000)}\n`
    : '';

  const prompt=`Buatkan konten makalah akademik ${jenis} lengkap dengan judul: "${judul}", untuk mata kuliah/bidang: ${bidang}.${catatan?(' Catatan tambahan dari penulis: '+catatan):''}${referensiBlok}

Balas HANYA dengan JSON valid (tanpa blok kode markdown, tanpa teks lain di luar JSON) sesuai struktur berikut PERSIS:
{
  "judul": "judul makalah huruf kapital",
  "kata_pengantar": "1-2 paragraf kata pengantar formal",
  "bab1_sub": [{"judul":"1.1 Latar Belakang","isi":"paragraf isi"}, {"judul":"1.2 Rumusan Masalah","isi":"paragraf isi, boleh berbentuk poin bernomor dalam teks biasa"}, {"judul":"1.3 Tujuan Penulisan","isi":"paragraf isi"}],
  "bab2_sub": [${Array(jumlahSubBab).fill(0).map((_,i)=>`{"judul":"2.${i+1} [sub-topik pembahasan relevan]","isi":"paragraf isi mendalam"}`).join(', ')}],
  "bab3_sub": [{"judul":"3.1 Kesimpulan","isi":"paragraf isi"}, {"judul":"3.2 Saran","isi":"paragraf isi"}],
  "daftar_pustaka": ["referensi format APA 1", "referensi format APA 2", "referensi format APA 3", "referensi format APA 4"]
}

ATURAN PENTING:
- Semua teks di dalam nilai "isi" dan "kata_pengantar" HARUS berupa paragraf biasa dalam Bahasa Indonesia akademik formal.
- JANGAN gunakan tanda pagar (#), tanda bintang (**), atau format markdown apapun di dalam teks.
- Bab 2 (Pembahasan) berisi ${jumlahSubBab} sub-bab dengan topik yang relevan dan spesifik terhadap judul makalah (ganti [sub-topik pembahasan relevan] dengan topik nyata).
- Daftar pustaka harus realistis dan dalam format APA, gunakan nama penulis dan tahun yang masuk akal untuk bidang ilmu terkait.${referensiText ? '\n- WAJIB gunakan isi file referensi di atas sebagai sumber utama pembahasan, bukan hanya pengetahuan umum — sebutkan poin-poin pentingnya di Bab 2, dan masukkan sumbernya ke daftar pustaka.' : ''}`;

  localStorage.removeItem('task_result');
  localStorage.removeItem('task_result_structured');
  localStorage.setItem('task_prompt', judul);
  localStorage.setItem('task_type', 'makalah');
  localStorage.setItem('task_full_prompt', prompt);
  localStorage.setItem('makalah_meta', JSON.stringify({judul, bidang, jenis, penulis}));
  showToast('Memproses makalah dengan AI...');
  setTimeout(()=>window.location.href='hasil-tugas.html',500);
}
if(!localStorage.getItem('ak_token')){window.location.href='login.html';}
</script>
</body>
