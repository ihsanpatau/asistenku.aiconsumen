<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metode Pembayaran – asistenku.pro</title>
<link rel="stylesheet" href="style.css">
<script src="theme.js"></script>
<script src="i18n.js"></script>
<style>
.pay-card { margin:16px; background:var(--white); border:1px solid var(--gray-200); border-radius:var(--radius-lg); padding:14px; display:flex; align-items:center; gap:12px; }
.pay-icon { width:44px; height:32px; border-radius:6px; background:#1A2B6D; color:#fff; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; flex-shrink:0; }
.pay-body { flex:1; }
.pay-title { font-size:13px; font-weight:700; color:var(--dark); }
.pay-sub { font-size:11px; color:var(--gray-400); margin-top:1px; }
.pay-default { font-size:10px; font-weight:700; color:#166534; background:#DCFCE7; padding:2px 8px; border-radius:20px; }
.pay-del { background:none; border:none; color:#DC2626; cursor:pointer; padding:6px; }
.add-pay-btn { margin:0 16px 16px; }
</style>
</head>
<body>
<div class="app">
  <div class="backnav">
    <div class="backnav-left">
      <button class="back-btn" onclick="history.back()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
      <div><div class="backnav-title" data-i18n="backnav.pembayaran.title">Metode Pembayaran</div><div class="backnav-sub" data-i18n="backnav.pembayaran.sub">Kelola metode pembayaran Anda</div></div>
    </div>
  </div>
  <div class="page-content">
    <div id="payList"></div>
    <button class="btn btn-outline add-pay-btn" style="width:calc(100% - 32px);" onclick="openAddPay()">+ Tambah Metode Pembayaran</button>

    <div style="margin:0 16px 16px;background:var(--blue-pale);border-radius:var(--radius-lg);padding:12px 14px;font-size:12px;color:var(--blue);line-height:1.5;">
      ℹ️ Pembayaran paket diproses lewat Midtrans saat checkout. Metode yang tersimpan di sini hanya untuk mempercepat pengisian data checkout Anda.
    </div>
    <div style="height:20px;"></div>
  </div>
    <nav class="bottom-nav">
    <a href="beranda.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span class="nav-label" data-i18n="nav.beranda">Beranda</span></a>
    <a href="riwayat.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span class="nav-label" data-i18n="nav.riwayat">Riwayat</span></a>
    <a href="dokumen.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span class="nav-label" data-i18n="nav.dokumen">Dokumen</span></a>
    <a href="upgrade.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg><span class="nav-label" data-i18n="nav.kuota">Kuota Saya</span></a>
    <a href="profil.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2"/></svg><span class="nav-label" data-i18n="nav.profil">Profil</span></a>
  </nav>
</div>

<div class="modal-overlay" id="addPayModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div style="font-size:16px;font-weight:800;color:var(--dark);margin-bottom:14px;text-align:center;">Tambah Metode Pembayaran</div>
    <div class="form-group">
      <label class="form-label">Jenis</label>
      <select class="form-select" id="payJenis" onchange="onJenisChange()">
        <option value="kartu">Kartu Debit/Kredit</option>
        <option value="ewallet">E-Wallet (OVO/GoPay/DANA)</option>
        <option value="bank">Transfer Bank</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" id="payLabelUtama">Nomor Kartu</label>
      <input type="text" class="form-input" id="payNomor" placeholder="0000 0000 0000 0000" inputmode="numeric">
    </div>
    <div class="form-group">
      <label class="form-label">Nama Pemilik</label>
      <input type="text" class="form-input" id="payNama" placeholder="Nama sesuai kartu/akun">
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:6px;" onclick="savePay()">Simpan</button>
    <button class="btn btn-outline" style="width:100%;margin-top:8px;" onclick="closeAddPay()">Batal</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
function showToast(msg,d=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
if(!localStorage.getItem('ak_token')){window.location.href='login.html';}

const KEY='ak_payment_methods';
function getMethods(){ try{ return JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){ return []; } }
function saveMethods(list){ localStorage.setItem(KEY, JSON.stringify(list)); }

const jenisIcon={ kartu:'KARTU', ewallet:'EWLT', bank:'BANK' };
const jenisLabel={ kartu:'Kartu Debit/Kredit', ewallet:'E-Wallet', bank:'Transfer Bank' };

function maskNomor(jenis,nomor){
  if(jenis==='kartu'){ const d=nomor.replace(/\D/g,''); return '•••• '+d.slice(-4); }
  if(jenis==='ewallet') return nomor;
  return nomor.replace(/\D/g,'').replace(/(\d{4})(?=\d)/g,'$1 ').trim();
}

function renderPay(){
  const list=getMethods();
  const wrap=document.getElementById('payList');
  if(!list.length){
    wrap.innerHTML=`
      <div style="text-align:center;padding:36px 16px;color:var(--gray-400);">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:10px;"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        <div style="font-size:13px;font-weight:600;color:var(--gray-500);">Belum ada metode pembayaran</div>
        <div style="font-size:12px;margin-top:2px;">Tambahkan metode pembayaran untuk mempercepat checkout paket.</div>
      </div>`;
    return;
  }
  wrap.innerHTML=list.map((m,i)=>`
    <div class="pay-card">
      <div class="pay-icon">${jenisIcon[m.jenis]}</div>
      <div class="pay-body">
        <div class="pay-title">${jenisLabel[m.jenis]} ${maskNomor(m.jenis,m.nomor)}</div>
        <div class="pay-sub">${(m.nama||'').replace(/</g,'&lt;')}</div>
      </div>
      ${m.default?'<span class="pay-default">Utama</span>':`<button onclick="setDefault(${i})" style="background:none;border:none;color:var(--blue-light);font-size:11px;font-weight:700;cursor:pointer;">Jadikan Utama</button>`}
      <button class="pay-del" onclick="delPay(${i})" aria-label="Hapus">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    </div>`).join('');
}

function onJenisChange(){
  const j=document.getElementById('payJenis').value;
  const labelMap={kartu:'Nomor Kartu', ewallet:'Nomor HP Terdaftar', bank:'Nomor Rekening'};
  const placeMap={kartu:'0000 0000 0000 0000', ewallet:'08xxxxxxxxxx', bank:'Nomor rekening'};
  document.getElementById('payLabelUtama').textContent=labelMap[j];
  document.getElementById('payNomor').placeholder=placeMap[j];
}
function openAddPay(){ document.getElementById('addPayModal').classList.add('open'); }
function closeAddPay(){
  document.getElementById('addPayModal').classList.remove('open');
  document.getElementById('payNomor').value='';
  document.getElementById('payNama').value='';
}
function savePay(){
  const jenis=document.getElementById('payJenis').value;
  const nomor=document.getElementById('payNomor').value.trim();
  const nama=document.getElementById('payNama').value.trim();
  if(!nomor||!nama){ showToast('Lengkapi semua kolom'); return; }
  const list=getMethods();
  list.push({ jenis, nomor, nama, default:list.length===0 });
  saveMethods(list);
  closeAddPay();
  renderPay();
  showToast('Metode pembayaran ditambahkan');
}
function delPay(i){
  if(!confirm('Hapus metode pembayaran ini?')) return;
  const list=getMethods();
  const wasDefault=list[i].default;
  list.splice(i,1);
  if(wasDefault && list.length) list[0].default=true;
  saveMethods(list);
  renderPay();
  showToast('Metode pembayaran dihapus');
}
function setDefault(i){
  const list=getMethods();
  list.forEach((m,idx)=>m.default=(idx===i));
  saveMethods(list);
  renderPay();
  showToast('Metode utama diperbarui');
}
renderPay();
</script>
</body>
</html>
