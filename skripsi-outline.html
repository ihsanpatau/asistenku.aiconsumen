<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outline Skripsi – asistenku.pro</title>
<link rel="stylesheet" href="style.css">
<script src="theme.js"></script>
<script src="i18n.js"></script>
<style>
.outline-item {
  background: var(--white);
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  cursor: pointer;
}
.outline-item.active { border-color: var(--blue-light); background: var(--blue-pale); }
.outline-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--blue-light);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.outline-item.active .outline-num { background: var(--blue); }
.outline-body { flex: 1; }
.outline-title { font-size: 14px; font-weight: 700; color: var(--dark); }
.outline-sub { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
.drag-handle { color: var(--gray-400); cursor: grab; }
.outline-check { color: var(--green); width: 18px; height: 18px; }
.add-bab-btn {
  width: 100%;
  padding: 11px;
  border: 2px dashed var(--gray-200);
  background: transparent;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  color: var(--blue-light);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 4px;
}
.add-bab-btn:hover { border-color: var(--blue-light); background: var(--blue-pale); }
</style>
</head>
<body>
<div class="app">
  <div class="backnav">
    <div class="backnav-left">
      <button class="back-btn" onclick="history.back()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <div>
        <div class="backnav-title" data-i18n="backnav.skripsi_outline.title">Outline Skripsi</div>
        <div class="backnav-sub" data-i18n="backnav.skripsi_outline.sub">Atur struktur bab dan sub-bab</div>
      </div>
    </div>
  </div>

  <div class="page-content">
    <!-- Steps -->
    <div class="steps">
      <div class="step done"><div class="step-circle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><div class="step-label">Informasi</div></div>
      <div class="step-line done"></div>
      <div class="step active"><div class="step-circle">2</div><div class="step-label">Outline</div></div>
      <div class="step-line"></div>
      <div class="step"><div class="step-circle">3</div><div class="step-label">Pengaturan</div></div>
      <div class="step-line"></div>
      <div class="step"><div class="step-circle">4</div><div class="step-label">Konfirmasi</div></div>
    </div>

    <div style="padding:0 16px;">
      <div id="judulDisplay" style="background:var(--blue-pale);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--blue);font-weight:600;margin-bottom:14px;line-height:1.4;"></div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:15px;font-weight:800;color:var(--dark);">Struktur Outline</div>
        <button onclick="regenerateOutline()" style="background:var(--blue-pale);border:none;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;display:flex;align-items:center;gap:4px;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
          Regenerate AI
        </button>
      </div>

      <div id="outlineList">
        <div style="text-align:center;padding:30px;color:var(--gray-400);">⏳ Membuat outline...</div>
      </div>

      <button class="add-bab-btn" onclick="addBab()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Tambah Bab
      </button>

      <div class="info-banner" style="margin:14px 0;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1A3DC2" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        <div>Klik pada bab untuk mengedit nama. Drag untuk mengubah urutan. AI akan mengisi konten berdasarkan outline ini.</div>
      </div>

      <button class="btn btn-primary" onclick="lanjutPengaturan()">
        Lanjut ke Pengaturan <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
      </button>
      <div style="height:20px;"></div>
    </div>
  </div>

    <nav class="bottom-nav">
    <a href="beranda.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span class="nav-label" data-i18n="nav.beranda">Beranda</span></a>
    <a href="riwayat.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span class="nav-label" data-i18n="nav.riwayat">Riwayat</span></a>
    <a href="dokumen.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span class="nav-label" data-i18n="nav.dokumen">Dokumen</span></a>
    <a href="upgrade.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg><span class="nav-label" data-i18n="nav.kuota">Kuota Saya</span></a>
    <a href="profil.html" class="nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2"/></svg><span class="nav-label" data-i18n="nav.profil">Profil</span></a>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script>
function showToast(msg,d=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
if(!localStorage.getItem('ak_token')){window.location.href='login.html';}
const data=JSON.parse(localStorage.getItem('skripsi_data')||'{}');
let outlineData=[];

document.getElementById('judulDisplay').textContent=data.judul||'Judul belum diisi';

const defaultOutline=[
  {num:'BAB I', title:'Pendahuluan', subs:['Latar Belakang Masalah','Rumusan Masalah','Tujuan Penelitian','Manfaat Penelitian']},
  {num:'BAB II', title:'Tinjauan Pustaka', subs:['Landasan Teori','Penelitian Terdahulu','Kerangka Berpikir','Hipotesis Penelitian']},
  {num:'BAB III', title:'Metode Penelitian', subs:['Jenis Penelitian','Populasi dan Sampel','Teknik Pengumpulan Data','Analisis Data']},
  {num:'BAB IV', title:'Hasil dan Pembahasan', subs:['Gambaran Umum','Hasil Penelitian','Pembahasan','Implikasi']},
  {num:'BAB V', title:'Penutup', subs:['Simpulan','Saran']},
];

function renderOutline(outline){
  const list=document.getElementById('outlineList');
  list.innerHTML=outline.map((bab,i)=>`
    <div class="outline-item ${i===0?'active':''}">
      <div class="outline-num">${i+1}</div>
      <div class="outline-body">
        <div class="outline-title" contenteditable="true">${bab.num}: ${bab.title}</div>
        <div class="outline-sub">${bab.subs.join(' • ')}</div>
      </div>
      <svg class="drag-handle" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="6" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="18" r="1"/></svg>
    </div>
  `).join('');
  outlineData=outline;
}

async function regenerateOutline(){
  if(!data.judul){showToast('Data judul tidak ditemukan');return;}
  document.getElementById('outlineList').innerHTML='<div style="text-align:center;padding:30px;color:var(--gray-400);">⏳ Membuat outline dengan AI...</div>';
  try{
    const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(await AkAccount.getValidToken())},body:JSON.stringify({messages:[{role:'user',content:`Buatkan outline skripsi untuk judul: "${data.judul}", jenis: ${data.jenis||'Kuantitatif'}. Buat 5 BAB dengan masing-masing 4 sub-bab. Format JSON array: [{num:"BAB I", title:"...", subs:["...","...","...","..."]}]. Hanya JSON.`}]})});
    const d2=await res.json();
    if(!res.ok) throw new Error(d2.error||'Gagal terhubung ke server');
    const txt=d2.text||'[]';
    const clean=txt.replace(/```json|```/g,'').trim();
    renderOutline(JSON.parse(clean));
    showToast('Outline berhasil dibuat ✓');
  }catch(e){renderOutline(defaultOutline);showToast('Menggunakan outline standar');}
}

function addBab(){
  const newBab={num:`BAB ${outlineData.length+1}`,title:'Bab Baru',subs:['Sub Bab 1','Sub Bab 2']};
  outlineData.push(newBab);
  renderOutline(outlineData);
}
function lanjutPengaturan(){
  localStorage.setItem('skripsi_outline',JSON.stringify(outlineData));
  window.location.href='skripsi-pengaturan.html';
}

// Auto-load
regenerateOutline();
</script>
</body>
</html>
