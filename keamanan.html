<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keamanan – asistenku.pro</title>
<link rel="stylesheet" href="style.css">
<script src="theme.js"></script>
<script src="i18n.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.sec-card { margin:16px; background:var(--white); border:1px solid var(--gray-200); border-radius:var(--radius-lg); padding:16px; }
.sec-card-title { font-size:14px; font-weight:700; color:var(--dark); margin-bottom:2px; }
.sec-card-desc { font-size:12px; color:var(--gray-400); margin-bottom:14px; }
.error-msg { display:none; align-items:center; gap:7px; background:#FEF2F2; border:1px solid #FECACA; border-radius:8px; padding:10px 13px; font-size:13px; color:#DC2626; margin-bottom:14px; }
.success-msg { display:none; align-items:center; gap:7px; background:#ECFDF5; border:1px solid #A7F3D0; border-radius:8px; padding:10px 13px; font-size:13px; color:#166534; margin-bottom:14px; }
</style>
</head>
<body>
<div class="app">
  <div class="backnav">
    <div class="backnav-left">
      <button class="back-btn" onclick="history.back()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
      <div><div class="backnav-title" data-i18n="backnav.keamanan.title">Keamanan</div><div class="backnav-sub" data-i18n="backnav.keamanan.sub">Ubah password dan pengaturan keamanan</div></div>
    </div>
  </div>
  <div class="page-content">

    <div class="sec-card">
      <div class="sec-card-title">Ubah Kata Sandi</div>
      <div class="sec-card-desc">Masukkan kata sandi saat ini lalu kata sandi baru Anda.</div>

      <div class="error-msg" id="errMsg"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg><span id="errText"></span></div>
      <div class="success-msg" id="okMsg"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>Kata sandi berhasil diubah</span></div>

      <div class="form-group">
        <label class="form-label">Kata Sandi Saat Ini</label>
        <div class="input-wrap">
          <input type="password" class="form-input has-action" id="curPass" autocomplete="current-password">
          <button class="input-action" type="button" onclick="togglePass('curPass',this)" aria-label="Tampilkan"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Kata Sandi Baru</label>
        <div class="input-wrap">
          <input type="password" class="form-input has-action" id="newPass" autocomplete="new-password">
          <button class="input-action" type="button" onclick="togglePass('newPass',this)" aria-label="Tampilkan"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <div style="font-size:11px;color:var(--gray-400);margin-top:4px;">Minimal 6 karakter</div>
      </div>
      <div class="form-group">
        <label class="form-label">Konfirmasi Kata Sandi Baru</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="confPass" autocomplete="new-password">
        </div>
      </div>
      <button class="btn btn-primary" id="changeBtn" onclick="doChangePassword()" style="width:100%;">Simpan Kata Sandi Baru</button>
    </div>

    <div class="sec-card">
      <div class="sec-card-title">Sesi Aktif</div>
      <div class="sec-card-desc">Anda sedang masuk di perangkat ini.</div>
      <button class="btn btn-outline" style="width:100%;" onclick="handleLogoutAll()">Keluar dari Semua Perangkat</button>
    </div>

    <div style="height:20px;"></div>
  </div>
    <nav class="bottom-nav">
    <a href="beranda.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span class="nav-label" data-i18n="nav.beranda">Beranda</span></a>
    <a href="riwayat.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span class="nav-label" data-i18n="nav.riwayat">Riwayat</span></a>
    <a href="dokumen.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span class="nav-label" data-i18n="nav.dokumen">Dokumen</span></a>
    <a href="upgrade.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg><span class="nav-label" data-i18n="nav.kuota">Kuota Saya</span></a>
    <a href="profil.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2"/></svg><span class="nav-label" data-i18n="nav.profil">Profil</span></a>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script>
function showToast(msg,d=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
if(!localStorage.getItem('ak_token')){window.location.href='login.html';}

const SB_URL='https://dkpztybbcvvzatgwhano.supabase.co';
const SB_KEY='sb_publishable_yYIlVG0GWf85R3wK_xjhfQ_1gqucStm';
const _sb=window.supabase.createClient(SB_URL,SB_KEY);
const user=JSON.parse(localStorage.getItem('ak_user')||'{}');

function togglePass(id,btn){ const i=document.getElementById(id); i.type = i.type==='password'?'text':'password'; }
function showErr(msg){ const e=document.getElementById('errMsg'); document.getElementById('errText').textContent=msg; e.style.display='flex'; document.getElementById('okMsg').style.display='none'; }
function hideMsgs(){ document.getElementById('errMsg').style.display='none'; document.getElementById('okMsg').style.display='none'; }

async function doChangePassword(){
  hideMsgs();
  const curPass=document.getElementById('curPass').value;
  const newPass=document.getElementById('newPass').value;
  const confPass=document.getElementById('confPass').value;

  if(!curPass || !newPass || !confPass){ showErr('Semua kolom wajib diisi'); return; }
  if(newPass.length<6){ showErr('Kata sandi baru minimal 6 karakter'); return; }
  if(newPass!==confPass){ showErr('Konfirmasi kata sandi tidak cocok'); return; }
  if(!user.email){ showErr('Sesi tidak valid, silakan masuk ulang'); return; }

  const btn=document.getElementById('changeBtn');
  btn.disabled=true; btn.textContent='Memproses...';

  try{
    // Verifikasi kata sandi saat ini dengan mencoba sign-in ulang
    const verifyRes=await fetch(`${SB_URL}/auth/v1/token?grant_type=password`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_KEY},
      body:JSON.stringify({email:user.email, password:curPass})
    });
    const verifyData=await verifyRes.json();
    if(!verifyData.access_token){
      showErr('Kata sandi saat ini salah');
      btn.disabled=false; btn.textContent='Simpan Kata Sandi Baru';
      return;
    }

    // Gunakan token hasil verifikasi supaya perubahan pasti berlaku untuk sesi ini
    const _sbAuthed=window.supabase.createClient(SB_URL,SB_KEY,{ global:{ headers:{ Authorization:'Bearer '+verifyData.access_token } } });
    const { data, error } = await _sbAuthed.auth.updateUser({ password:newPass });

    if(error){
      showErr(error.message || 'Gagal mengubah kata sandi');
      btn.disabled=false; btn.textContent='Simpan Kata Sandi Baru';
      return;
    }

    localStorage.setItem('ak_token', verifyData.access_token);
    if(data?.user) localStorage.setItem('ak_user', JSON.stringify(data.user));

    document.getElementById('okMsg').style.display='flex';
    document.getElementById('curPass').value='';
    document.getElementById('newPass').value='';
    document.getElementById('confPass').value='';
    showToast('Kata sandi berhasil diubah');
  }catch(e){
    showErr('Tidak bisa terhubung ke server. Coba lagi.');
  }
  btn.disabled=false; btn.textContent='Simpan Kata Sandi Baru';
}

function handleLogoutAll(){
  if(confirm('Keluar dari semua perangkat? Anda perlu masuk kembali.')){
    _sb.auth.signOut({scope:'global'}).catch(()=>{});
    localStorage.removeItem('ak_token');
    localStorage.removeItem('ak_user');
    window.location.href='login.html';
  }
}
</script>
</body>
</html>
