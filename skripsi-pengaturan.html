<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengaturan Skripsi – asistenku.pro</title>
<link rel="stylesheet" href="style.css">
<script src="theme.js"></script>
<script src="i18n.js"></script>
</head>
<body>
<div class="app">
  <div class="backnav">
    <div class="backnav-left">
      <button class="back-btn" onclick="history.back()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <div><div class="backnav-title" data-i18n="backnav.skripsi_pengaturan.title">Pengaturan</div><div class="backnav-sub" data-i18n="backnav.skripsi_pengaturan.sub">Gaya & format dokumen</div></div>
    </div>
  </div>
  <div class="page-content">
    <div class="steps">
      <div class="step done"><div class="step-circle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><div class="step-label">Informasi</div></div>
      <div class="step-line done"></div>
      <div class="step done"><div class="step-circle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><div class="step-label">Outline</div></div>
      <div class="step-line done"></div>
      <div class="step active"><div class="step-circle">3</div><div class="step-label">Pengaturan</div></div>
      <div class="step-line"></div>
      <div class="step"><div class="step-circle">4</div><div class="step-label">Konfirmasi</div></div>
    </div>
    <div style="padding:0 16px;">
      <div style="font-size:15px;font-weight:800;color:var(--dark);margin-bottom:14px;">Gaya Penulisan</div>
      <div class="form-group">
        <label class="form-label">Bahasa</label>
        <div class="type-pills">
          <button class="type-pill active" onclick="selectPill(this,'bahasa')">🇮🇩 Indonesia</button>
          <button class="type-pill" onclick="selectPill(this,'bahasa')">🇬🇧 Inggris</button>
          <button class="type-pill" onclick="selectPill(this,'bahasa')">Campuran</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Gaya Sitasi</label>
        <div class="type-pills">
          <button class="type-pill active" onclick="selectPill(this,'sitasi')">APA 7th</button>
          <button class="type-pill" onclick="selectPill(this,'sitasi')">Chicago</button>
          <button class="type-pill" onclick="selectPill(this,'sitasi')">Harvard</button>
          <button class="type-pill" onclick="selectPill(this,'sitasi')">IEEE</button>
          <button class="type-pill" onclick="selectPill(this,'sitasi')">Vancouver</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Tingkat Keformalan</label>
        <div class="type-pills">
          <button class="type-pill active" onclick="selectPill(this,'formal')">Sangat Formal</button>
          <button class="type-pill" onclick="selectPill(this,'formal')">Formal</button>
          <button class="type-pill" onclick="selectPill(this,'formal')">Semi-Formal</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Format Dokumen</label>
        <div class="type-pills">
          <button class="type-pill active" onclick="selectPill(this,'format')">Word (.docx)</button>
          <button class="type-pill" onclick="selectPill(this,'format')">PDF</button>
          <button class="type-pill" onclick="selectPill(this,'format')">Semua Format</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Font</label>
        <select class="form-input" style="appearance:none;">
          <option>Times New Roman 12pt</option>
          <option>Arial 11pt</option>
          <option>Calibri 11pt</option>
          <option>Garamond 12pt</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Spasi</label>
        <div class="type-pills">
          <button class="type-pill" onclick="selectPill(this,'spasi')">1.0</button>
          <button class="type-pill active" onclick="selectPill(this,'spasi')">1.5</button>
          <button class="type-pill" onclick="selectPill(this,'spasi')">2.0</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Margin</label>
        <div class="type-pills">
          <button class="type-pill" onclick="selectPill(this,'margin')">Standar (2.5cm)</button>
          <button class="type-pill active" onclick="selectPill(this,'margin')">Wide (3cm)</button>
          <button class="type-pill" onclick="selectPill(this,'margin')">Skripsi (4-3-3-3)</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Fitur Tambahan</label>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:6px;">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" checked style="accent-color:var(--blue-light);"> Sertakan daftar isi otomatis</label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" checked style="accent-color:var(--blue-light);"> Sertakan daftar pustaka</label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" style="accent-color:var(--blue-light);"> Sertakan daftar gambar &amp; tabel</label>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" style="accent-color:var(--blue-light);"> Cek plagiarisme otomatis</label>
        </div>
      </div>
      <button class="btn btn-primary" onclick="lanjutKonfirmasi()">
        Lanjut ke Konfirmasi <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
      </button>
      <div style="height:20px;"></div>
    </div>
  </div>
    <nav class="bottom-nav">
    <a href="beranda.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span class="nav-label" data-i18n="nav.beranda">Beranda</span></a>
    <a href="riwayat.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span class="nav-label" data-i18n="nav.riwayat">Riwayat</span></a>
    <a href="dokumen.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span class="nav-label" data-i18n="nav.dokumen">Dokumen</span></a>
    <a href="upgrade.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg><span class="nav-label" data-i18n="nav.kuota">Kuota Saya</span></a>
    <a href="profil.html" class="nav-item"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4" fill="none" stroke="currentColor" stroke-width="2"/></svg><span class="nav-label" data-i18n="nav.profil">Profil</span></a>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script>
function showToast(msg,d=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function selectPill(btn,group){btn.closest('.type-pills').querySelectorAll('.type-pill').forEach(p=>p.classList.remove('active'));btn.classList.add('active');}
function lanjutKonfirmasi(){window.location.href='skripsi-konfirmasi.html';}
if(!localStorage.getItem('ak_token')){window.location.href='login.html';}
</script>
</body>
</html>
